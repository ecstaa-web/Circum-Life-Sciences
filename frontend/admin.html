<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Admin · Circum Life Sciences</title>
<link href="css/main.css" rel="stylesheet"/>
<link as="image" href="assets/img/circum-logo.png" rel="preload"/>
<style>
  body { background: var(--gray-50); }
  .admin-shell { max-width: 1280px; margin: 0 auto; padding: 32px var(--gutter); }
  .admin-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .admin-brand { display: flex; align-items: center; gap: 14px; }
  .admin-brand img { height: 36px; }
  .admin-brand strong { font-size: 18px; color: var(--blue-dark); letter-spacing: .02em; }
  .admin-brand .tag { font-size: 11px; padding: 3px 8px; border: 1px solid var(--pink); color: var(--pink-dark); border-radius: 999px; text-transform: uppercase; letter-spacing: .08em; }
  .admin-user { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .admin-user img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
  .admin-user .who { line-height: 1.2; }
  .admin-user .who small { display: block; color: var(--text-muted); font-size: 11px; }

  .login-card { max-width: 460px; margin: 60px auto; background: var(--white); padding: 40px; border: 1px solid var(--border); border-radius: 6px; text-align: center; box-shadow: 0 8px 30px rgba(32,90,153,0.06); }
  .login-card h1 { font-size: 26px; margin-bottom: 12px; color: var(--blue-dark); }
  .login-card p { color: var(--text-soft); margin-bottom: 28px; font-size: 14px; }
  .gbtn { display: inline-flex; align-items: center; gap: 12px; padding: 14px 24px; background: var(--white); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 15px; transition: all .18s ease; color: var(--text); }
  .gbtn:hover { border-color: var(--blue); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(32,90,153,.12); }
  .gbtn svg { width: 18px; height: 18px; }
  .login-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 18px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: .15em; }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .login-form { display: flex; flex-direction: column; gap: 10px; text-align: left; }
  .login-form input { padding: 12px 14px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; transition: border-color .15s ease; }
  .login-form input:focus { outline: none; border-color: var(--blue); }
  .btn-login { padding: 12px 18px; background: var(--blue); color: var(--white); border: none; border-radius: 4px; cursor: pointer; font-size: 14px; letter-spacing: .03em; transition: background .15s ease; }
  .btn-login:hover { background: var(--blue-dark); }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; }
  .login-error { background: #fdecea; border: 1px solid #f5b7b1; color: #922b21; padding: 10px 14px; border-radius: 4px; font-size: 13px; margin-top: 6px; }

  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 36px; }
  .stat { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 22px; }
  .stat .v { font-size: 36px; font-weight: 600; color: var(--blue-dark); line-height: 1; }
  .stat .l { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; color: var(--text-muted); margin-top: 8px; }

  .panel { background: var(--white); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 28px; overflow: hidden; }
  .panel-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .panel-head h2 { font-size: 18px; color: var(--blue-dark); }
  .panel-head .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-mini { padding: 8px 14px; border: 1px solid var(--blue); color: var(--blue); background: var(--white); border-radius: 3px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; cursor: pointer; transition: all .15s ease; }
  .btn-mini:hover { background: var(--blue); color: var(--white); }
  .btn-mini.pink { border-color: var(--pink); color: var(--pink-dark); }
  .btn-mini.pink:hover { background: var(--pink); color: var(--white); }
  .btn-mini.danger { border-color: var(--error); color: var(--error); }
  .btn-mini.danger:hover { background: var(--error); color: var(--white); }
  .btn-mini.ghost { border-color: var(--border); color: var(--text-muted); }

  .table-wrap { overflow-x: auto; }
  table.admin-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.admin-tbl th { text-align: left; padding: 12px 16px; background: var(--blue-50); color: var(--blue-dark); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; border-bottom: 1px solid var(--blue-100); }
  table.admin-tbl td { padding: 12px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
  table.admin-tbl tr:hover td { background: var(--gray-50); }
  table.admin-tbl td.muted { color: var(--text-muted); font-size: 12px; }
  .pill { display: inline-block; padding: 3px 8px; font-size: 11px; border-radius: 999px; background: var(--blue-50); color: var(--blue-dark); }
  .empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; }

  .allow-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--gray-100); }
  .allow-row:last-child { border-bottom: 0; }
  .allow-row .who { flex: 1; }
  .allow-row .who strong { color: var(--text); }
  .allow-row .who small { display: block; color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .allow-add { display: flex; gap: 10px; padding: 16px; background: var(--gray-50); border-top: 1px solid var(--border); }
  .allow-add input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 3px; }
  .allow-add input:focus { outline: none; border-color: var(--blue); }

  .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 22px; background: var(--blue-dark); color: var(--white); border-radius: 4px; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.18); opacity: 0; transform: translateY(10px); transition: all .25s ease; z-index: 9999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { background: var(--error); }

  .logout { padding: 8px 14px; border: 1px solid var(--border); border-radius: 3px; background: var(--white); cursor: pointer; font-size: 12px; color: var(--text-soft); }
  .logout:hover { color: var(--error); border-color: var(--error); }

  .access-denied { background: #fdecea; border: 1px solid #f5b7b1; color: #922b21; padding: 22px; border-radius: 4px; margin-top: 24px; }
  .loading-state { padding: 80px; text-align: center; color: var(--text-muted); }

  /* Newsletter issues panel */
  .issue-row { display: grid; grid-template-columns: 80px 1fr auto; gap: 20px; padding: 20px 22px; border-bottom: 1px solid var(--gray-100); align-items: center; }
  .issue-row:last-child { border-bottom: 0; }
  .issue-tag { background: var(--blue-50); color: var(--blue-dark); padding: 12px; border-radius: 4px; text-align: center; }
  .issue-tag strong { display: block; font-size: 18px; }
  .issue-tag span { font-size: 11px; opacity: .7; }
  .issue-body h3 { font-size: 16px; color: var(--text); margin: 4px 0 6px; }
  .issue-body p { font-size: 13px; color: var(--text-soft); line-height: 1.5; }
  .issue-date { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: .12em; }
  .issue-actions { display: flex; gap: 8px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; backdrop-filter: blur(4px); }
  .modal { background: var(--white); border-radius: 6px; padding: 32px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h3 { color: var(--blue-dark); margin-bottom: 20px; font-size: 20px; }
  .modal label { display: block; font-size: 12px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .08em; margin-top: 14px; }
  .modal input, .modal select, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 3px; font-size: 14px; margin-top: 6px; font-family: inherit; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--blue); }
  .modal textarea { resize: vertical; min-height: 100px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--gray-100); }
</style>
</head>
<body>

<div class="admin-shell">
  <div class="admin-header">
    <div class="admin-brand">
      <img alt="Circum Life Sciences" src="assets/img/circum-logo.png"/>
      <strong>Espace Admin</strong>
      <span class="tag">Privé</span>
    </div>
    <div id="user-zone"></div>
  </div>

  <div id="main-zone">
    <div class="loading-state" data-testid="admin-loading">Chargement…</div>
  </div>
</div>

<div class="toast" id="toast" data-testid="admin-toast"></div>

<script>
(function () {
  var API = '/api';
  // REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS, THIS BREAKS THE AUTH
  var REDIRECT_URL = window.location.origin + '/admin.html';

  var mainZone = document.getElementById('main-zone');
  var userZone = document.getElementById('user-zone');
  var toastEl = document.getElementById('toast');

  function toast(msg, isErr) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(function () { toastEl.classList.remove('show'); }, 3000);
  }

  function escapeHTML(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) +
        ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso; }
  }

  function api(path, opts) {
    opts = opts || {};
    opts.credentials = 'include';
    opts.headers = opts.headers || {};
    return fetch(API + path, opts);
  }

  function renderLogin(deniedEmail, loginError) {
    userZone.innerHTML = '';
    mainZone.innerHTML =
      '<div class="login-card" data-testid="login-card">' +
        '<h1>Espace réservé.</h1>' +
        '<p>Connectez-vous pour accéder aux leads, candidatures et éditions newsletter.</p>' +
        '<button class="gbtn" id="login-btn" data-testid="login-btn">' +
          '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83C6.71 7.31 9.14 5.38 12 5.38z"/></svg>' +
          '<span>Se connecter avec Google</span>' +
        '</button>' +
        '<div class="login-divider"><span>ou</span></div>' +
        '<form class="login-form" id="login-form" data-testid="login-form">' +
          '<input type="email" name="email" required placeholder="email@exemple.com" data-testid="login-email"/>' +
          '<input type="password" name="password" required placeholder="Mot de passe" data-testid="login-password"/>' +
          '<button type="submit" class="btn-login" data-testid="login-submit">Se connecter</button>' +
          (loginError ? '<div class="login-error" data-testid="login-error">' + escapeHTML(loginError) + '</div>' : '') +
        '</form>' +
        (deniedEmail ? '<div class="access-denied" data-testid="access-denied">Accès refusé pour <strong>' + escapeHTML(deniedEmail) + '</strong>. Cet email n\'est pas dans la liste blanche admin.</div>' : '') +
      '</div>';
    document.getElementById('login-btn').addEventListener('click', function () {
      // REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS, THIS BREAKS THE AUTH
      window.location.href = 'https://auth.emergentagent.com/?redirect=' + encodeURIComponent(REDIRECT_URL);
    });
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var f = e.target;
      var btn = f.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Connexion…';
      api('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: f.email.value, password: f.password.value })
      }).then(function (r) {
        if (r.ok) { checkAuth(); return; }
        return r.json().then(function (j) {
          var msg = (j && j.detail) ? j.detail : ('Erreur ' + r.status);
          renderLogin('', msg);
        });
      }).catch(function () { renderLogin('', 'Erreur réseau'); });
    });
  }

  function renderDashboard(user) {
    userZone.innerHTML =
      '<div class="admin-user" data-testid="admin-user">' +
        (user.picture ? '<img src="' + escapeHTML(user.picture) + '" alt=""/>' : '') +
        '<div class="who"><strong>' + escapeHTML(user.name || user.email) + '</strong><small>' + escapeHTML(user.email) + '</small></div>' +
        '<button class="logout" id="logout-btn" data-testid="logout-btn">Déconnexion</button>' +
      '</div>';
    document.getElementById('logout-btn').addEventListener('click', logout);

    mainZone.innerHTML =
      '<div class="stat-row" data-testid="stats-row">' +
        '<div class="stat"><div class="v" id="stat-leads" data-testid="stat-leads">—</div><div class="l">Abonnés Newsletter</div></div>' +
        '<div class="stat"><div class="v" id="stat-apps" data-testid="stat-apps">—</div><div class="l">Candidatures reçues</div></div>' +
        '<div class="stat"><div class="v" id="stat-admins" data-testid="stat-admins">—</div><div class="l">Admins autorisés</div></div>' +
      '</div>' +

      '<div class="panel" data-testid="panel-leads">' +
        '<div class="panel-head">' +
          '<h2>Leads Newsletter</h2>' +
          '<div class="actions">' +
            '<button class="btn-mini" id="dl-leads-csv" data-testid="dl-leads-csv">Télécharger CSV</button>' +
            '<button class="btn-mini pink" id="dl-leads-json" data-testid="dl-leads-json">Télécharger JSON</button>' +
          '</div>' +
        '</div>' +
        '<div id="leads-table" class="table-wrap"></div>' +
      '</div>' +

      '<div class="panel" data-testid="panel-apps">' +
        '<div class="panel-head">' +
          '<h2>Candidatures Carrières</h2>' +
          '<div class="actions">' +
            '<button class="btn-mini" id="dl-apps-csv" data-testid="dl-apps-csv">Télécharger CSV</button>' +
            '<button class="btn-mini pink" id="dl-apps-json" data-testid="dl-apps-json">Télécharger JSON</button>' +
          '</div>' +
        '</div>' +
        '<div id="apps-table" class="table-wrap"></div>' +
      '</div>' +

      '<div class="panel" data-testid="panel-issues">' +
        '<div class="panel-head">' +
          '<h2>Newsletter — Éditions</h2>' +
          '<div class="actions">' +
            '<button class="btn-mini pink" id="new-issue-btn" data-testid="new-issue-btn">+ Nouvelle édition</button>' +
          '</div>' +
        '</div>' +
        '<div id="issues-list"></div>' +
      '</div>' +

      '<div class="panel" data-testid="panel-admins">' +
        '<div class="panel-head">' +
          '<h2>Gestion des admins</h2>' +
        '</div>' +
        '<div id="allowlist-list"></div>' +
        '<form class="allow-add" id="allow-add-form" data-testid="allow-add-form">' +
          '<input type="email" id="allow-add-email" data-testid="allow-add-email" placeholder="nouveau.admin@circumlifesciences.com" required/>' +
          '<button class="btn-mini" type="submit" data-testid="allow-add-btn">Ajouter admin</button>' +
        '</form>' +
      '</div>';

    document.getElementById('dl-leads-csv').addEventListener('click', function () { triggerDownload('/admin/leads.csv'); });
    document.getElementById('dl-leads-json').addEventListener('click', function () { triggerDownload('/admin/leads.json'); });
    document.getElementById('dl-apps-csv').addEventListener('click', function () { triggerDownload('/admin/applications.csv'); });
    document.getElementById('dl-apps-json').addEventListener('click', function () { triggerDownload('/admin/applications.json'); });
    document.getElementById('allow-add-form').addEventListener('submit', addAdmin);
    document.getElementById('new-issue-btn').addEventListener('click', function () { openIssueEditor(null); });

    loadLeads();
    loadApps();
    loadAllowlist();
    loadIssues();
  }

  function triggerDownload(path) {
    // Use fetch to ensure credentials/cookie are sent, then create blob URL
    api(path).then(function (r) {
      if (r.status === 401 || r.status === 403) { toast('Session expirée', true); return null; }
      if (!r.ok) { toast('Erreur ' + r.status, true); return null; }
      return r.blob().then(function (blob) {
        var disp = r.headers.get('content-disposition') || '';
        var match = /filename="?([^"]+)"?/.exec(disp);
        var filename = match ? match[1] : path.split('/').pop();
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 0);
        toast('Téléchargement: ' + filename);
      });
    });
  }

  function loadLeads() {
    api('/admin/leads').then(function (r) { return r.json(); }).then(function (data) {
      document.getElementById('stat-leads').textContent = data.count;
      var c = document.getElementById('leads-table');
      if (!data.items.length) { c.innerHTML = '<div class="empty">Aucun abonné pour le moment.</div>'; return; }
      var rows = data.items.map(function (l) {
        return '<tr data-testid="lead-row">' +
          '<td><strong>' + escapeHTML(l.firstname || '') + ' ' + escapeHTML(l.lastname || '') + '</strong></td>' +
          '<td>' + escapeHTML(l.email) + '</td>' +
          '<td>' + escapeHTML(l.company || '—') + '</td>' +
          '<td>' + escapeHTML(l.role || '—') + '</td>' +
          '<td><span class="pill">' + escapeHTML((l.lang || 'fr').toUpperCase()) + '</span></td>' +
          '<td class="muted">' + escapeHTML(fmtDate(l.created_at)) + '</td>' +
          '<td><button class="btn-mini danger" data-id="' + escapeHTML(l.id) + '" data-testid="del-lead-btn">×</button></td>' +
        '</tr>';
      }).join('');
      c.innerHTML = '<table class="admin-tbl"><thead><tr><th>Nom</th><th>Email</th><th>Société</th><th>Fonction</th><th>Langue</th><th>Date</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
      c.querySelectorAll('button[data-testid="del-lead-btn"]').forEach(function (btn) {
        btn.addEventListener('click', function () { deleteLead(btn.getAttribute('data-id')); });
      });
    });
  }

  function deleteLead(id) {
    if (!confirm('Supprimer ce lead ?')) return;
    api('/admin/leads/' + encodeURIComponent(id), { method: 'DELETE' }).then(function (r) {
      if (r.ok) { toast('Lead supprimé'); loadLeads(); }
      else toast('Erreur ' + r.status, true);
    });
  }

  function loadApps() {
    api('/admin/applications').then(function (r) { return r.json(); }).then(function (data) {
      document.getElementById('stat-apps').textContent = data.count;
      var c = document.getElementById('apps-table');
      if (!data.items.length) { c.innerHTML = '<div class="empty">Aucune candidature pour le moment.</div>'; return; }
      var rows = data.items.map(function (a) {
        return '<tr data-testid="app-row">' +
          '<td><strong>' + escapeHTML(a.firstname || '') + ' ' + escapeHTML(a.lastname || '') + '</strong><br/><small style="color:var(--text-muted)">' + escapeHTML(a.email) + (a.phone ? ' · ' + escapeHTML(a.phone) : '') + '</small></td>' +
          '<td>' + escapeHTML(a.position || '—') + '<br/><small style="color:var(--text-muted)">' + escapeHTML(a.location || '—') + '</small></td>' +
          '<td>' + escapeHTML(a.experience || '—') + '<br/><small style="color:var(--text-muted)">Dispo: ' + escapeHTML(a.availability || '—') + '</small></td>' +
          '<td>' + (a.cv_filename ? '<a class="btn-mini" target="_blank" rel="noopener" href="' + API + '/careers/cv/' + escapeHTML(a.id) + '" data-testid="dl-cv-btn">CV ↓</a>' : '<span class="muted">—</span>') + '</td>' +
          '<td class="muted">' + escapeHTML(fmtDate(a.created_at)) + '</td>' +
          '<td><button class="btn-mini danger" data-id="' + escapeHTML(a.id) + '" data-testid="del-app-btn">×</button></td>' +
        '</tr>';
      }).join('');
      c.innerHTML = '<table class="admin-tbl"><thead><tr><th>Candidat</th><th>Poste</th><th>Expérience</th><th>CV</th><th>Date</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
      c.querySelectorAll('button[data-testid="del-app-btn"]').forEach(function (btn) {
        btn.addEventListener('click', function () { deleteApp(btn.getAttribute('data-id')); });
      });
    });
  }

  function deleteApp(id) {
    if (!confirm('Supprimer cette candidature (et son CV) ?')) return;
    api('/admin/applications/' + encodeURIComponent(id), { method: 'DELETE' }).then(function (r) {
      if (r.ok) { toast('Candidature supprimée'); loadApps(); }
      else toast('Erreur ' + r.status, true);
    });
  }

  // ============ Newsletter issues ============
  function loadIssues() {
    api('/admin/newsletter/issues').then(function (r) { return r.json(); }).then(function (data) {
      var c = document.getElementById('issues-list');
      if (!data.items.length) { c.innerHTML = '<div class="empty">Aucune édition pour le moment.</div>'; return; }
      c.innerHTML = data.items.map(function (i) {
        return '<div class="issue-row" data-testid="issue-row">' +
          '<div class="issue-tag"><strong>' + escapeHTML(i.quarter) + '</strong><span>' + escapeHTML(String(i.year)) + '</span></div>' +
          '<div class="issue-body">' +
            '<div class="issue-date">' + escapeHTML(fmtDate(i.date)) + '</div>' +
            '<h3>' + escapeHTML(i.title) + '</h3>' +
            '<p>' + escapeHTML(i.summary) + '</p>' +
          '</div>' +
          '<div class="issue-actions">' +
            '<button class="btn-mini" data-id="' + escapeHTML(i.id) + '" data-testid="edit-issue-btn">Modifier</button>' +
            '<button class="btn-mini danger" data-id="' + escapeHTML(i.id) + '" data-testid="del-issue-btn">Supprimer</button>' +
          '</div>' +
        '</div>';
      }).join('');
      c.querySelectorAll('button[data-testid="edit-issue-btn"]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = btn.getAttribute('data-id');
          var item = data.items.find(function (x) { return x.id === id; });
          openIssueEditor(item);
        });
      });
      c.querySelectorAll('button[data-testid="del-issue-btn"]').forEach(function (btn) {
        btn.addEventListener('click', function () { deleteIssue(btn.getAttribute('data-id')); });
      });
    });
  }

  function openIssueEditor(item) {
    var isEdit = !!item;
    var modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.setAttribute('data-testid', 'issue-modal');
    modal.innerHTML =
      '<div class="modal">' +
        '<h3>' + (isEdit ? 'Modifier l\'édition' : 'Nouvelle édition') + '</h3>' +
        '<form id="issue-form" data-testid="issue-form">' +
          '<div class="modal-row">' +
            '<label>Trimestre' +
              '<select name="quarter" required data-testid="issue-quarter">' +
                ['Q1','Q2','Q3','Q4'].map(function (q) { return '<option value="' + q + '"' + (item && item.quarter === q ? ' selected' : '') + '>' + q + '</option>'; }).join('') +
              '</select>' +
            '</label>' +
            '<label>Année<input type="number" name="year" required min="2000" max="2100" value="' + escapeHTML(String((item && item.year) || new Date().getFullYear())) + '" data-testid="issue-year"/></label>' +
            '<label>Date<input type="date" name="date" required value="' + escapeHTML((item && item.date) || (new Date().toISOString().slice(0,10))) + '" data-testid="issue-date"/></label>' +
          '</div>' +
          '<label>Titre<input type="text" name="title" required maxlength="240" value="' + escapeHTML((item && item.title) || '') + '" data-testid="issue-title"/></label>' +
          '<label>Résumé<textarea name="summary" required maxlength="1500" rows="4" data-testid="issue-summary">' + escapeHTML((item && item.summary) || '') + '</textarea></label>' +
          '<label>Lien (optionnel)<input type="url" name="link" value="' + escapeHTML((item && item.link) || '') + '" placeholder="https://…" data-testid="issue-link"/></label>' +
          '<div class="modal-actions">' +
            '<button type="button" class="btn-mini ghost" id="issue-cancel" data-testid="issue-cancel">Annuler</button>' +
            '<button type="submit" class="btn-mini pink" data-testid="issue-save">' + (isEdit ? 'Enregistrer' : 'Publier') + '</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(modal);
    modal.querySelector('#issue-cancel').addEventListener('click', function () { modal.remove(); });
    modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
    modal.querySelector('#issue-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var f = e.target;
      var payload = {
        quarter: f.quarter.value, year: parseInt(f.year.value, 10),
        date: f.date.value, title: f.title.value, summary: f.summary.value,
        link: f.link.value || null
      };
      var url = isEdit ? '/admin/newsletter/issues/' + encodeURIComponent(item.id) : '/admin/newsletter/issues';
      var method = isEdit ? 'PUT' : 'POST';
      api(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        .then(function (r) {
          if (!r.ok) return r.json().then(function (j) { throw new Error(j.detail || 'Erreur'); });
          return r.json();
        })
        .then(function () { modal.remove(); toast(isEdit ? 'Édition modifiée' : 'Édition publiée'); loadIssues(); })
        .catch(function (err) { toast(err.message || 'Erreur', true); });
    });
  }

  function deleteIssue(id) {
    if (!confirm('Supprimer cette édition ?')) return;
    api('/admin/newsletter/issues/' + encodeURIComponent(id), { method: 'DELETE' }).then(function (r) {
      if (r.ok) { toast('Édition supprimée'); loadIssues(); }
      else toast('Erreur ' + r.status, true);
    });
  }


  function loadAllowlist() {
    api('/admin/allowlist').then(function (r) { return r.json(); }).then(function (data) {
      document.getElementById('stat-admins').textContent = data.count;
      var c = document.getElementById('allowlist-list');
      c.innerHTML = data.items.map(function (a) {
        return '<div class="allow-row" data-testid="allow-row">' +
          '<div class="who"><strong>' + escapeHTML(a.email) + '</strong><small>ajouté par ' + escapeHTML(a.added_by || '—') + ' · ' + escapeHTML(fmtDate(a.created_at)) + '</small></div>' +
          '<button class="btn-mini" data-email="' + escapeHTML(a.email) + '" data-testid="set-password-btn">Mot de passe</button>' +
          '<button class="btn-mini danger" data-email="' + escapeHTML(a.email) + '" data-testid="allow-remove-btn">Retirer</button>' +
        '</div>';
      }).join('');
      c.querySelectorAll('button[data-testid="allow-remove-btn"]').forEach(function (btn) {
        btn.addEventListener('click', function () { removeAdmin(btn.getAttribute('data-email')); });
      });
      c.querySelectorAll('button[data-testid="set-password-btn"]').forEach(function (btn) {
        btn.addEventListener('click', function () { openPasswordModal(btn.getAttribute('data-email')); });
      });
    });
  }

  function openPasswordModal(email) {
    var modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.setAttribute('data-testid', 'password-modal');
    modal.innerHTML =
      '<div class="modal" style="max-width:420px">' +
        '<h3>Mot de passe — ' + escapeHTML(email) + '</h3>' +
        '<form id="pw-form" data-testid="password-form">' +
          '<label>Nouveau mot de passe (8 caractères minimum)' +
            '<input type="password" name="password" required minlength="8" autocomplete="new-password" data-testid="password-input"/>' +
          '</label>' +
          '<label>Confirmer le mot de passe' +
            '<input type="password" name="confirm" required minlength="8" autocomplete="new-password" data-testid="password-confirm"/>' +
          '</label>' +
          '<div class="modal-actions">' +
            '<button type="button" class="btn-mini ghost" id="pw-cancel" data-testid="password-cancel">Annuler</button>' +
            '<button type="submit" class="btn-mini pink" data-testid="password-save">Enregistrer</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(modal);
    modal.querySelector('#pw-cancel').addEventListener('click', function () { modal.remove(); });
    modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
    modal.querySelector('#pw-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var f = e.target;
      if (f.password.value !== f.confirm.value) {
        toast('Les deux mots de passe ne correspondent pas', true);
        return;
      }
      api('/admin/allowlist/' + encodeURIComponent(email) + '/password', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: f.password.value })
      }).then(function (r) {
        if (!r.ok) return r.json().then(function (j) { throw new Error(j.detail || 'Erreur'); });
        return r.json();
      }).then(function () {
        modal.remove();
        toast('Mot de passe mis à jour pour ' + email);
      }).catch(function (err) { toast(err.message || 'Erreur', true); });
    });
  }

  function addAdmin(e) {
    e.preventDefault();
    var input = document.getElementById('allow-add-email');
    var email = input.value.trim();
    if (!email) return;
    api('/admin/allowlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    }).then(function (r) {
      if (!r.ok) { return r.json().then(function (j) { throw new Error(j.detail || 'error'); }); }
      return r.json();
    }).then(function (res) {
      input.value = '';
      toast(res.already_present ? 'Déjà admin' : 'Admin ajouté');
      loadAllowlist();
    }).catch(function (err) { toast(err.message || 'Erreur', true); });
  }

  function removeAdmin(email) {
    if (!confirm('Retirer ' + email + ' des admins ?')) return;
    api('/admin/allowlist/' + encodeURIComponent(email), { method: 'DELETE' })
      .then(function (r) {
        if (!r.ok) { return r.json().then(function (j) { throw new Error(j.detail || 'error'); }); }
        return r.json();
      })
      .then(function () { toast('Admin retiré'); loadAllowlist(); })
      .catch(function (err) { toast(err.message || 'Erreur', true); });
  }

  function logout() {
    api('/auth/logout', { method: 'POST' }).finally(function () {
      window.location.href = '/admin.html';
    });
  }

  // ============ Boot ============
  function exchangeSessionId(sessionId) {
    return api('/auth/google/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
  }

  function checkAuth() {
    api('/auth/me').then(function (r) {
      if (r.ok) return r.json().then(renderDashboard);
      renderLogin();
    }).catch(function () { renderLogin(); });
  }

  // 1) Handle session_id from URL fragment (returning from Google auth)
  if (window.location.hash && window.location.hash.indexOf('session_id=') !== -1) {
    var sid = window.location.hash.replace(/^#/, '').split('&').reduce(function (acc, kv) {
      var p = kv.split('='); acc[p[0]] = decodeURIComponent(p[1] || ''); return acc;
    }, {}).session_id;
    // clean URL immediately
    history.replaceState(null, '', window.location.pathname);
    if (sid) {
      exchangeSessionId(sid).then(function (r) {
        if (r.ok) {
          checkAuth();
        } else {
          return r.json().then(function (j) {
            if (r.status === 403) {
              var denied = '';
              if (j && j.detail) {
                var m = /:\s*([^\s]+@[^\s]+)/.exec(j.detail);
                if (m) denied = m[1];
              }
              renderLogin(denied);
            } else { renderLogin(); }
          }).catch(function () { renderLogin(); });
        }
      }).catch(function () { renderLogin(); });
      return;
    }
  }

  // 2) Otherwise check existing session
  checkAuth();
})();
</script>
</body>
</html>
